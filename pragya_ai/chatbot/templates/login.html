<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Login - Pragya AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f5f7fb;
}

</style>

</head>

<body>

<div class="flex items-center justify-center min-h-screen">

<div class="bg-white shadow-lg rounded-xl w-full max-w-md p-8">

<!-- HEADER -->

<div class="text-center mb-6">
<h1 class="text-3xl font-bold text-gray-800">Pragya AI</h1>
<p class="text-gray-500">Login to continue</p>
</div>

<!-- LOGIN FORM -->

<form method="POST" class="space-y-5">

{% csrf_token %}

<!-- EMAIL -->

<div>
<label class="block text-gray-700 mb-1">Email</label>
<input
type="email"
name="email"
placeholder="Enter your email"
required
class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
/>
</div>

<!-- PASSWORD -->

<div>
<label class="block text-gray-700 mb-1">Password</label>
<input
type="password"
name="password"
placeholder="Enter your password"
required
class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
/>
</div>

<!-- LOGIN BUTTON -->
<a href="{% url 'upload_data' %}">
<button
type="button"
class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition mt-6"
>

Login </button>
</a>


</form>

<!-- EXTRA LINKS -->

<div class="text-center mt-6 text-sm text-gray-500">
Don't have an account?
<a href="#" class="text-blue-500 hover:underline">Sign up</a>
</div>

</div>

</div>

</body>

</html>
