<!DOCTYPE html>
<html>
<head>
    <title>Pragya AI</title>
</head>
<body>
    <h1>Ask About Pragya</h1>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="question" placeholder="Ask something..." required>
        <button type="submit">Ask</button>
    </form>

    {% if answer %}
        <h3>Answer:</h3>
        <p>{{ answer }}</p>
    {% endif %}
</body>
</html>
